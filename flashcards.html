<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Flashcards</title>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --bg3: #ebebeb;
  --border: #e0e0e0;
  --border2: #d0d0d0;
  --text: #111111;
  --text2: #555555;
  --text3: #888888;
  --accent: #111111;
  --core-bg: #eaf3de; --core-border: #97c459; --core-text: #3b6d11;
  --extra-bg: #f3eaf8; --extra-border: #c084fc; --extra-text: #6b21a8;
  --fail-bg: #fcebeb; --fail-border: #f09595; --fail-text: #a32d2d;
  --hard-bg: #faeeda; --hard-border: #fac775; --hard-text: #854f0b;
  --med-bg: #e6f1fb; --med-border: #85b7eb; --med-text: #185fa5;
  --good-bg: #eaf3de; --good-border: #97c459; --good-text: #3b6d11;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111111; --bg2: #1c1c1c; --bg3: #262626;
    --border: #2e2e2e; --border2: #3a3a3a;
    --text: #f0f0f0; --text2: #aaaaaa; --text3: #666666;
    --accent: #f0f0f0;
    --core-bg: #173404; --core-border: #3b6d11; --core-text: #97c459;
    --extra-bg: #2d1a44; --extra-border: #7e22ce; --extra-text: #c084fc;
    --fail-bg: #501313; --fail-border: #a32d2d; --fail-text: #f09595;
    --hard-bg: #412402; --hard-border: #854f0b; --hard-text: #fac775;
    --med-bg: #042c53; --med-border: #185fa5; --med-text: #85b7eb;
    --good-bg: #173404; --good-border: #3b6d11; --good-text: #97c459;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column;
}

/* ── LAYOUT ── */
#top-bar {
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#top-bar::-webkit-scrollbar { display: none; }

#content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--safe-bottom) + 70px);
}

#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 4px; font-size: 10px; font-weight: 500;
  color: var(--text3); cursor: pointer; border: none; background: none;
  transition: color .15s;
}
.bnav-btn.active { color: var(--text); }
.bnav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; fill: none; stroke: currentColor; }

/* ── COURSE CHIPS ── */
.course-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 10px; border-radius: 20px; border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer;
  background: var(--bg); color: var(--text2); transition: all .15s;
  flex-shrink: 0;
}
.course-chip.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.course-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.course-chip .x-btn {
  display: none; width: 14px; height: 14px; border-radius: 50%;
  background: none; border: none; cursor: pointer; color: var(--text3);
  font-size: 12px; align-items: center; justify-content: center;
  padding: 0; line-height: 1;
}
.course-chip.active .x-btn { display: flex; }
.add-course-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 10px; border-radius: 20px; border: 1px dashed var(--border2);
  font-size: 13px; color: var(--text3); background: none; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}

/* ── CARDS ── */
.card-list { display: flex; flex-direction: column; gap: 8px; }
.flash-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 14px;
}
.flash-card .front { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.flash-card .back { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.flash-card .meta { font-size: 11px; color: var(--text3); margin-top: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pill {
  display: inline-flex; align-items: center; padding: 2px 8px;
  border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: .03em;
}
.pill.core { background: var(--core-bg); color: var(--core-text); border: 1px solid var(--core-border); }
.pill.extra { background: var(--extra-bg); color: var(--extra-text); border: 1px solid var(--extra-border); }
.toggle-branch-btn {
  background: none; border: 1px solid var(--border); border-radius: 20px;
  padding: 1px 8px; font-size: 10px; cursor: pointer; color: var(--text3);
}
.del-card-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; margin-left: auto; flex-shrink: 0; }

/* ── FORM ── */
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
textarea, input[type=text], select {
  width: 100%; padding: 11px 13px; font-size: 15px;
  font-family: inherit; border: 1px solid var(--border); border-radius: 12px;
  background: var(--bg); color: var(--text); outline: none; transition: border .15s;
}
textarea:focus, input[type=text]:focus, select:focus { border-color: var(--border2); }
textarea { min-height: 80px; resize: vertical; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 20px; font-size: 15px; font-weight: 600; border-radius: 12px;
  border: 1px solid var(--border); background: var(--bg3); color: var(--text);
  cursor: pointer; transition: all .15s; width: 100%;
}
.btn:active { opacity: .7; }
.btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }

/* ── BRANCH MINI STATS ── */
.branch-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.branch-mini-card {
  padding: 10px 12px; border-radius: 12px; border: 1px solid;
  display: flex; flex-direction: column; gap: 2px;
}
.branch-mini-card.core { background: var(--core-bg); border-color: var(--core-border); }
.branch-mini-card.extra { background: var(--extra-bg); border-color: var(--extra-border); }
.branch-mini-label { font-size: 10px; font-weight: 700; letter-spacing: .04em; }
.branch-mini-card.core .branch-mini-label { color: var(--core-text); }
.branch-mini-card.extra .branch-mini-label { color: var(--extra-text); }
.branch-mini-val { font-size: 20px; font-weight: 600; color: var(--text); }

/* ── PRACTICE ── */
.mode-row { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-chip {
  flex: 1; padding: 9px 4px; border-radius: 10px; border: 1px solid var(--border);
  font-size: 12px; font-weight: 700; text-align: center; cursor: pointer;
  background: var(--bg2); color: var(--text2); transition: all .15s;
}
.mode-chip.core.active { background: var(--core-bg); border-color: var(--core-border); color: var(--core-text); box-shadow: 0 0 0 2px var(--core-border); }
.mode-chip.extra.active { background: var(--extra-bg); border-color: var(--extra-border); color: var(--extra-text); box-shadow: 0 0 0 2px var(--extra-border); }
.mode-chip.both.active { background: var(--bg3); border-color: var(--border2); color: var(--text); box-shadow: 0 0 0 2px var(--border2); }
.mode-chip .sub { font-size: 10px; font-weight: 400; display: block; margin-top: 1px; }

.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.stat-box { background: var(--bg2); border-radius: 12px; padding: 10px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }

.progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--core-text); border-radius: 2px; transition: width .3s; }

/* ── FLASHCARD ── */
.practice-card-wrap { perspective: 1000px; height: 220px; margin-bottom: 14px; cursor: pointer; }
.practice-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .4s cubic-bezier(.4,0,.2,1); }
.practice-card.flipped { transform: rotateY(180deg); }
.pcard-face {
  position: absolute; inset: 0; border-radius: 18px;
  border: 1.5px solid var(--border); background: var(--bg);
  backface-visibility: hidden; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 20px; text-align: center;
}
.pcard-face.back { transform: rotateY(180deg); }
.pcard-face.core-card { border-color: var(--core-border); }
.pcard-face.extra-card { border-color: var(--extra-border); }
.pcard-hint { font-size: 11px; color: var(--text3); position: absolute; top: 12px; left: 0; right: 0; text-align: center; }
.pcard-num { font-size: 11px; color: var(--text3); position: absolute; bottom: 12px; right: 14px; }
.pcard-text { font-size: 18px; font-weight: 600; line-height: 1.4; }
.pcard-back-text { font-size: 15px; color: var(--text2); line-height: 1.5; }

/* branch toggle on card */
.card-branch-toggle { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; }
.cbt { padding: 3px 8px; font-size: 9px; font-weight: 700; border-radius: 20px; border: 1px solid; cursor: pointer; }
.cbt.core { background: var(--core-bg); border-color: var(--core-border); color: var(--core-text); }
.cbt.extra { background: var(--extra-bg); border-color: var(--extra-border); color: var(--extra-text); }
.cbt.off { opacity: .3; background: transparent; }

/* rating */
.rating-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.rate-btn {
  padding: 14px 8px; border-radius: 14px; border: 1px solid; cursor: pointer;
  font-size: 14px; font-weight: 700; display: flex; flex-direction: column;
  align-items: center; gap: 3px; transition: all .1s;
}
.rate-btn:active { transform: scale(.96); }
.rate-btn .ivl { font-size: 10px; font-weight: 400; }
.rate-btn.fail { background: var(--fail-bg); border-color: var(--fail-border); color: var(--fail-text); }
.rate-btn.hard { background: var(--hard-bg); border-color: var(--hard-border); color: var(--hard-text); }
.rate-btn.med { background: var(--med-bg); border-color: var(--med-border); color: var(--med-text); }
.rate-btn.good { background: var(--good-bg); border-color: var(--good-border); color: var(--good-text); }

/* ── DONE BANNER ── */
.done-wrap { text-align: center; padding: 40px 20px; }
.done-icon { font-size: 48px; margin-bottom: 12px; }
.done-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.done-sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }

/* ── STATS VIEW ── */
.stats-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin: 16px 0 8px; }
.stat-card-row { display: flex; gap: 8px; margin-bottom: 8px; }
.stat-card-item { flex: 1; background: var(--bg2); border-radius: 12px; padding: 12px; text-align: center; }
.sci-val { font-size: 22px; font-weight: 700; }
.sci-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }
.split-bar { height: 6px; border-radius: 3px; overflow: hidden; display: flex; gap: 1px; margin-top: 6px; }
.sb-core { background: #639922; }
.sb-extra { background: #a855f7; }
.rating-bar-wrap { background: var(--bg2); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
.rating-bar-track { height: 8px; border-radius: 4px; overflow: hidden; display: flex; margin: 6px 0 8px; }
.rbt-seg { height: 100%; }
.rating-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; }
.rl-item { font-size: 11px; }

/* ── OVERVIEW ── */
.ov-effort-bar { display: flex; height: 28px; border-radius: 10px; overflow: hidden; gap: 2px; margin: 8px 0 10px; }
.ov-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: rgba(255,255,255,.9); border-radius: 4px; overflow: hidden; white-space: nowrap; }
.ov-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-bottom: 16px; }
.ov-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.ov-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.course-ov-card { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.cov-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.cov-kpis { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; margin-bottom: 10px; }
.cov-kpi { background: var(--bg2); border-radius: 8px; padding: 6px 3px; text-align: center; }
.cov-kpi .v { font-size: 13px; font-weight: 600; }
.cov-kpi .l { font-size: 9px; color: var(--text3); margin-top: 1px; }
.bar-mini { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.bar-mini-fill { height: 100%; border-radius: 3px; }

/* ── IMPORT ── */
.prompt-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
.prompt-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.prompt-preview { font-size: 11px; color: var(--text2); line-height: 1.6; max-height: 120px; overflow: hidden; position: relative; }
.prompt-preview::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, var(--bg2)); }
.copy-btn { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 10px; padding: 11px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
.copy-btn.copied { border-color: var(--core-border); color: var(--core-text); background: var(--core-bg); }
.how-to { background: var(--bg2); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: var(--text2); line-height: 1.7; }
.import-drop { border: 1.5px dashed var(--border2); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
.import-drop textarea { border: none; background: transparent; padding: 0; font-size: 13px; min-height: 120px; }
.status-ok { background: var(--core-bg); border: 1px solid var(--core-border); color: var(--core-text); border-radius: 10px; padding: 10px 12px; font-size: 13px; font-weight: 500; margin-bottom: 10px; }
.status-err { background: var(--fail-bg); border: 1px solid var(--fail-border); color: var(--fail-text); border-radius: 10px; padding: 10px 12px; font-size: 13px; margin-bottom: 10px; }
.preview-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 6px; background: var(--bg); }
.pi-front { font-size: 13px; font-weight: 600; }
.pi-back { font-size: 12px; color: var(--text2); margin-top: 2px; }
.import-actions { display: flex; flex-direction: column; gap: 8px; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
.modal-sheet { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px 20px calc(var(--safe-bottom) + 20px); width: 100%; max-width: 500px; }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.modal-body { font-size: 14px; color: var(--text2); margin-bottom: 0; line-height: 1.5; }
.modal-opts { display: flex; gap: 8px; margin-top: 14px; }
.modal-opt { flex: 1; padding: 14px 8px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg2); cursor: pointer; text-align: center; font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.modal-opt .opt-icon { font-size: 22px; }
.modal-opt.archive { border-color: var(--med-border); color: var(--med-text); background: var(--med-bg); }
.modal-opt.trash { border-color: var(--fail-border); color: var(--fail-text); background: var(--fail-bg); }
.modal-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.modal-confirm-btn { padding: 14px; border-radius: 14px; border: 1px solid var(--fail-border); background: var(--fail-bg); color: var(--fail-text); font-size: 15px; font-weight: 700; cursor: pointer; }
.modal-cancel-btn { padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 15px; cursor: pointer; }

/* ── ARCHIVE PAGE ── */
.back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; padding: 0; margin-bottom: 16px; }
.arch-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px; background: var(--bg); }
.arch-item.dim { opacity: .6; }
.arch-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.arch-name { font-size: 14px; font-weight: 600; }
.arch-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.arch-actions { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }
.arch-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid; font-size: 12px; font-weight: 600; cursor: pointer; }
.arch-btn.restore { background: var(--core-bg); border-color: var(--core-border); color: var(--core-text); }
.arch-btn.del { background: var(--fail-bg); border-color: var(--fail-border); color: var(--fail-text); }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div id="top-bar"></div>
<div id="content"></div>
<div id="bottom-nav"></div>
<div id="modal-root"></div>

<script>
const SK = 'anki_mob_v1';
const PALETTE = ['#4F81BD','#639922','#C0504D','#8064A2','#F59B0B','#17A2B8','#E91E8C','#FF7043'];

const MASTER_PROMPT = `You are a flashcard generator. The user will give you course material, a lesson, notes, or a topic. Your job is to generate study flashcards in a strict machine-readable format so they can be imported directly into a flashcard app.

OUTPUT FORMAT — follow this exactly, no deviations:

##FLASHCARDS_START##
CARD_START
FRONT: [Question or concept]
BACK: [Answer or explanation — concise, max 2 sentences]
BRANCH: [CORE or EXTRA]
CARD_END
##FLASHCARDS_END##

RULES:
1. Output ONLY the block above. No intro text, no commentary, no markdown outside the block.
2. BRANCH must be exactly CORE or EXTRA (uppercase).
   - CORE = essential concepts, definitions, formulas the student must know
   - EXTRA = nuances, edge cases, supplementary details, nice-to-know
3. FRONT must be a clear question or prompt (not a statement).
4. BACK must be concise — a student reading it in 5 seconds should understand.
5. Generate between 10 and 30 cards depending on the density of the material.
6. Never leave FRONT, BACK, or BRANCH empty.
7. Do not add any text before ##FLASHCARDS_START## or after ##FLASHCARDS_END##.

The user will now provide the course material. Generate the flashcards.`;

let S = {
  courses: [], cards: [], archived: [],
  activeCourse: null, activeView: 'create',
  page: 'main', // 'main' | 'archive'
  practiceMode: 'both',
  session: { queue: [], current: 0, flipped: false, stats: { good:0,med:0,hard:0,fail:0 }, cid: null, mode: null },
  modal: null, // { type, data }
  importRaw: '', importParsed: [], importStatus: null, importError: null, importSuccess: false
};

// ── TRIPLE-LAYER PERSISTENT STORAGE ──
// Layer 1: IndexedDB  (primary — works on file://, survives app close, best for iOS/Android)
// Layer 2: localStorage (fast sync fallback)
// Layer 3: in-memory  (last resort while tab is open)
// Every save() writes to ALL available layers simultaneously.

const DB_NAME='FlashcardsDB', DB_STORE='kv', DB_VER=1;
let _idb=null;
let _storageReady=false;

function _openIDB(){
  return new Promise((res,rej)=>{
    if(!window.indexedDB){rej('no-idb');return;}
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(DB_STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>rej(r.error);
  });
}
function _idbSet(db,key,val){
  return new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put(val,key);
    tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
  });
}
function _idbGet(db,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readonly');
    const r=tx.objectStore(DB_STORE).get(key);
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  });
}
function _lsSave(d){try{localStorage.setItem(SK,JSON.stringify(d));return true;}catch(e){return false;}}
function _lsLoad(){try{const v=localStorage.getItem(SK);return v?JSON.parse(v):null;}catch(e){return null;}}

function save(){
  const data={courses:S.courses,cards:S.cards,archived:S.archived};
  _lsSave(data);
  if(_idb) _idbSet(_idb,SK,data).catch(()=>{});
}

function _applyData(d){
  if(!d) return false;
  S.courses=d.courses||[]; S.cards=d.cards||[]; S.archived=d.archived||[];
  return S.courses.length>0||S.cards.length>0;
}
function _seedDefaults(){

async function load(){
  // Try IndexedDB
  try{_idb=await _openIDB();}catch(e){_idb=null;}

  let loaded=false;

  if(_idb){
    try{
      const d=await _idbGet(_idb,SK);
      if(d&&((d.courses||[]).length>0||(d.cards||[]).length>0)){
        _applyData(d); loaded=true;
        _lsSave(d); // mirror to localStorage
      }
    }catch(e){}
  }

  if(!loaded){
    const d=_lsLoad();
    if(_applyData(d)){
      loaded=true;
      if(_idb) _idbSet(_idb,SK,d).catch(()=>{}); // migrate up to IDB
    }
  }

  if(!loaded){ _seedDefaults(); save(); }

  S.cards.forEach(c=>{if(!c.br)c.br='core';if(!c.hist)c.hist=[];});
  S.courses.forEach((c,i)=>{if(c.ci===undefined)c.ci=i%PALETTE.length;});
  if(!S.activeCourse&&S.courses.length) S.activeCourse=S.courses[0].id;
  _storageReady=true;
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nid = () => S.cards.length ? Math.max(0,...S.cards.map(c=>c.id))+1 : 1;
const color = c => PALETTE[c.ci % PALETTE.length];
const cCards = cid => S.cards.filter(c=>c.cid===cid);
const bCards = (cid,br) => cCards(cid).filter(c=>c.br===br);
const due = (cid,mode) => {
  const now=Date.now();
  return cCards(cid).filter(c=>{
    if(c.due>now) return false;
    if(mode==='core') return c.br==='core';
    if(mode==='extra') return c.br==='extra';
    return true;
  });
};
const totalReps = cid => cCards(cid).reduce((s,c)=>s+(c.reps||0),0);
const coverage = (cid,br) => {
  const cards = br ? bCards(cid,br) : cCards(cid);
  if(!cards.length) return 0;
  return Math.round(cards.filter(c=>c.reps>0).length/cards.length*100);
};
const wSuccess = hist => {
  if(!hist||!hist.length) return null;
  let n=0,d=0;
  hist.forEach((r,i)=>{ const w=Math.pow(1.5,i); d+=w; n+=w*(r>=2?1:0); });
  return Math.round(n/d*100);
};
const fmtDue = c => {
  if(c.due<=Date.now()) return 'Due now';
  return 'in '+Math.ceil((c.due-Date.now())/86400000)+'d';
};
const fmtDate = ts => new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

function calcInterval(card, r) {
  let ef=card.ef, iv=card.iv, reps=card.reps;
  if(r===0){reps=0;iv=1;ef=Math.max(1.3,ef-.2);}
  else if(r===1){reps=Math.max(0,reps-1);iv=Math.max(1,Math.round(iv*.7));ef=Math.max(1.3,ef-.15);}
  else if(r===2){reps++;if(reps===1)iv=1;else if(reps===2)iv=4;else iv=Math.round(iv*ef*.9);ef=Math.max(1.3,ef-.05);}
  else{reps++;if(reps===1)iv=1;else if(reps===2)iv=4;else iv=Math.round(iv*ef);ef=Math.min(2.5,ef+.1);}
  return {iv,ef,reps};
}
function ivLabel(card, r) {
  const {iv} = calcInterval({...card},r);
  if(iv<1) return '<1d'; if(iv===1) return '1d'; if(iv<7) return iv+'d';
  if(iv<30) return Math.round(iv/7)+'w'; return Math.round(iv/30)+'mo';
}
function applyRating(card, r) {
  const res = calcInterval(card, r);
  card.iv=res.iv; card.ef=res.ef; card.reps=res.reps;
  card.due = Date.now() + res.iv*86400000;
  card.hist = [...(card.hist||[]), r].slice(-20);
  save();
}

function parseImport(text) {
  const s=text.indexOf('##FLASHCARDS_START##'), e=text.indexOf('##FLASHCARDS_END##');
  if(s===-1||e===-1||e<s) return {error:'Block ##FLASHCARDS_START## / ##FLASHCARDS_END## not found.',cards:[]};
  const block=text.slice(s+20,e);
  const raws=block.split('CARD_START').slice(1);
  const out=[];
  for(const raw of raws){
    const body=raw.slice(0,raw.indexOf('CARD_END'));
    const front=(body.match(/FRONT:\s*(.+?)(?=\nBACK:|\nBRANCH:|$)/s)||[])[1]?.trim()||'';
    const back=(body.match(/BACK:\s*(.+?)(?=\nFRONT:|\nBRANCH:|$)/s)||[])[1]?.trim()||'';
    const brRaw=(body.match(/BRANCH:\s*(\w+)/)||[])[1]?.toUpperCase()||'CORE';
    if(front&&back) out.push({front,back,br:brRaw==='EXTRA'?'extra':'core'});
  }
  if(!out.length) return {error:'No valid cards found in the block.',cards:[]};
  return {error:null,cards:out};
}

function renderCreate(course) {
  const cards = [...cCards(course.id)].sort((a,b)=>b.id-a.id);
  const coreN = cards.filter(c=>c.br==='core').length;
  const extraN = cards.filter(c=>c.br==='extra').length;
  const list = cards.length ? cards.map(c=>{
    const ws=wSuccess(c.hist);
    return `<div class="flash-card">
      <div class="front">${esc(c.front)}</div>
      <div class="back">${esc(c.back)}</div>
      <div class="meta">
        <span class="pill ${c.br}">${c.br.toUpperCase()}</span>
        <span>${fmtDue(c)} · ${c.reps} reps${ws!==null?' · '+ws+'%':''}</span>
        <button class="toggle-branch-btn" onclick="toggleBranch(${c.id})">→ ${c.br==='core'?'Extra':'Core'}</button>
        <button class="del-card-btn" onclick="delCard(${c.id})">🗑</button>
      </div>

    <div class="field"><label>Front (question)</label><textarea id="inp-front" placeholder="e.g. Define the Fisher equation"></textarea></div>
    <div class="field"><label>Back (answer)</label><textarea id="inp-back" placeholder="e.g. (1+r) = (1+ρ)(1+π)"></textarea></div>
    <button class="btn primary" onclick="addCard()" style="margin-bottom:16px">+ Add as Core</button>
    <div class="card-list">${list}</div>`;
}

function renderPractice(course) {
  const cid = course.id, mode = S.practiceMode;
  const coreN=due(cid,'core').length, extraN=due(cid,'extra').length, bothN=due(cid,'both').length;
  const filtered = cCards(cid).filter(c=>mode==='both'?true:c.br===mode);
  const rh = filtered.filter(c=>c.reps>0).flatMap(c=>c.hist.slice(-5));
  const ws = rh.length ? Math.round(rh.filter(r=>r>=2).length/rh.length*100) : null;
  const cov = coverage(cid, mode==='both'?null:mode);
  const dueNow = due(cid,mode);
  const wsColor = ws===null?'var(--text3)':ws>=70?'var(--core-text)':ws>=40?'var(--hard-text)':'var(--fail-text)';

  const modeRow = `<div class="mode-row">
    <button class="mode-chip core${mode==='core'?' active':''}" onclick="setMode('core')">CORE<span class="sub">${coreN} due</span></button>
    <button class="mode-chip extra${mode==='extra'?' active':''}" onclick="setMode('extra')">EXTRA<span class="sub">${extraN} due</span></button>
    <button class="mode-chip both${mode==='both'?' active':''}" onclick="setMode('both')">ALL<span class="sub">${bothN} due</span></button>
  </div>`;
  const statsRow = `<div class="stats-row">
    <div class="stat-box"><div class="stat-val" style="color:${dueNow.length?'var(--hard-text)':'var(--core-text)'}">${dueNow.length}</div><div class="stat-lbl">Due</div></div>
    <div class="stat-box"><div class="stat-val" style="color:${cov>=70?'var(--core-text)':cov>=40?'var(--hard-text)':'var(--fail-text)'}">${cov}%</div><div class="stat-lbl">Coverage</div></div>
    <div class="stat-box"><div class="stat-val" style="color:${wsColor}">${ws!==null?ws+'%':'—'}</div><div class="stat-lbl">Success</div></div>
  </div>`;

  const s = S.session;
  if (!s.queue.length || s.cid!==cid || s.mode!==mode) {
    return modeRow + statsRow + `<div class="done-wrap">
      <div class="done-icon">${dueNow.length?'▶️':'✅'}</div>
      <div class="done-title">${dueNow.length ? dueNow.length+' card'+(dueNow.length>1?'s':'')+' due' : 'All caught up!'}</div>
      <div class="done-sub">${dueNow.length?'Start a session to review them.':'No cards due in this branch.'}</div>
      ${dueNow.length?`<button class="btn primary" onclick="startSession('${cid}','${mode}')">▶ Start Session</button>`:''}
    </div>`;
  }
  if (s.current >= s.queue.length) {
    return modeRow + statsRow + `<div class="done-wrap">
      <div class="done-icon">🎉</div>
      <div class="done-title">Session complete!</div>
      <div class="done-sub">Reviewed ${s.queue.length} card${s.queue.length>1?'s':''}.<br>Good: ${s.stats.good} · Medium: ${s.stats.med} · Hard: ${s.stats.hard} · Fail: ${s.stats.fail}</div>
      <button class="btn primary" onclick="startSession('${cid}','${mode}')">↻ Review again</button>
    </div>`;
  }

  const card = s.queue[s.current];
  const prog = Math.round(s.current/s.queue.length*100);
  const isCore = card.br==='core';
  const faceClass = isCore?'core-card':'extra-card';
  const brToggle = `<div class="card-branch-toggle">
    <button class="cbt core${isCore?'':' off'}" onclick="event.stopPropagation();setCardBranch(${card.id},'core')">CORE</button>
    <button class="cbt extra${!isCore?'':' off'}" onclick="event.stopPropagation();setCardBranch(${card.id},'extra')">EXTRA</button>
  </div>`;

  const ratingRow = s.flipped ? `<div class="rating-grid">
    <button class="rate-btn fail" onclick="rate(0)">✕ Fail<span class="ivl">${ivLabel(card,0)}</span></button>
    <button class="rate-btn hard" onclick="rate(1)">🔥 Hard<span class="ivl">${ivLabel(card,1)}</span></button>
    <button class="rate-btn med" onclick="rate(2)">— Medium<span class="ivl">${ivLabel(card,2)}</span></button>
    <button class="rate-btn good" onclick="rate(3)">✓ Good<span class="ivl">${ivLabel(card,3)}</span></button>
  </div>` : `<p style="text-align:center;font-size:13px;color:var(--text3);margin-bottom:14px">Tap the card to reveal the answer</p>`;

  return modeRow + statsRow +
    `<div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div class="practice-card-wrap" onclick="flipCard()">
      <div class="practice-card${s.flipped?' flipped':''}">
        <div class="pcard-face ${faceClass}">
          ${brToggle}
          <span class="pcard-hint">tap to reveal</span>
          <div class="pcard-text">${esc(card.front)}</div>
          <span class="pcard-num">${s.current+1} / ${s.queue.length}</span>
        </div>
        <div class="pcard-face back ${faceClass}">
          ${brToggle}
          <span class="pcard-hint">how well did you know this?</span>
          <div class="pcard-back-text">${esc(card.back)}</div>
          <span class="pcard-num">${s.current+1} / ${s.queue.length}</span>
        </div>
      </div>
    </div>
    ${ratingRow}`;
}

  const m=hist.length?Math.round(hist.filter(r=>r===2).length/hist.length*100):0;
  const h=hist.length?Math.round(hist.filter(r=>r===1).length/hist.length*100):0;
  const f=hist.length?Math.round(hist.filter(r=>r===0).length/hist.length*100):0;

  const rows = all.map(c=>{
    const w=wSuccess(c.hist);
    const wc=w===null?'var(--text3)':w>=70?'var(--core-text)':w>=40?'var(--hard-text)':'var(--fail-text)';
    return `<div class="flash-card">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">

  return `
    <div class="stat-card-row">
      <div class="stat-card-item"><div class="sci-val">${all.length}</div><div class="sci-lbl">Total cards</div></div>
      <div class="stat-card-item">
        <div class="sci-val"><span style="color:var(--core-text)">${coreC.length}</span><span style="font-size:14px;color:var(--extra-text)"> / ${extraC.length}</span></div>
        <div class="sci-lbl">Core / Extra</div>
        <div class="split-bar"><div class="sb-core" style="width:${corePct}%;height:100%"></div><div class="sb-extra" style="width:${100-corePct}%;height:100%"></div></div>
      </div>
      <div class="stat-card-item"><div class="sci-val" style="color:${ws===null?'var(--text3)':ws>=70?'var(--core-text)':ws>=40?'var(--hard-text)':'var(--fail-text)'}">${ws!==null?ws+'%':'—'}</div><div class="sci-lbl">Success</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:var(--core-bg);border:1px solid var(--core-border);border-radius:12px;padding:10px">
        <div style="font-size:10px;font-weight:700;color:var(--core-text);margin-bottom:3px">● CORE</div>
        <div style="font-size:12px;color:var(--text2)">${coreC.length} cards · ${due(cid,'core').length} due · ${coverage(cid,'core')}% cov.</div>
      </div>
      <div style="background:var(--extra-bg);border:1px solid var(--extra-border);border-radius:12px;padding:10px">
        <div style="font-size:10px;font-weight:700;color:var(--extra-text);margin-bottom:3px">● EXTRA</div>
        <div style="font-size:12px;color:var(--text2)">${extraC.length} cards · ${due(cid,'extra').length} due · ${coverage(cid,'extra')}% cov.</div>
      </div>
    </div>
    ${hist.length?`<div class="rating-bar-wrap">
      <div class="sci-lbl">Rating breakdown</div>
      <div class="rating-bar-track">
        <div class="rbt-seg" style="width:${g}%;background:#639922"></div>
        <div class="rbt-seg" style="width:${m}%;background:#378add"></div>
        <div class="rbt-seg" style="width:${h}%;background:#ef9f27"></div>
        <div class="rbt-seg" style="width:${f}%;background:#e24b4a"></div>
      </div>
      <div class="rating-legend">
        <span class="rl-item" style="color:#3b6d11">■ Good ${g}%</span>
        <span class="rl-item" style="color:#185fa5">■ Medium ${m}%</span>
        <span class="rl-item" style="color:#854f0b">■ Hard ${h}%</span>
        <span class="rl-item" style="color:#a32d2d">■ Fail ${f}%</span>
      </div>
    </div>`:''}
    <div class="stats-section-title">Per card</div>
    <div class="card-list">${all.length?rows:`<div class="empty-state">No cards yet.</div>`}</div>`;
}

function renderOverview() {
  const cs = S.courses;
  if (!cs.length) return `<div class="empty-state">No courses yet.</div>`;
  const totalCards = S.cards.length;
  const totalDue = cs.reduce((s,c)=>s+due(c.id,'both').length,0);
  const ed = cs.map(c=>({c,reps:totalReps(c.id),cards:cCards(c.id).length}));
  const et = ed.reduce((s,e)=>s+e.reps,0)||1;
  const maxR = Math.max(...ed.map(e=>e.reps),1);
  const segs = ed.map(e=>{
    const p=Math.round(e.reps/et*100);
    return `<div class="ov-seg" style="width:${p||2}%;background:${color(e.c)}">${p>10?esc(e.c.name):''}</div>`;
  }).join('');
  const legend = cs.map(c=>`<span class="ov-legend-item"><span class="ov-dot" style="background:${color(c)}"></span>${esc(c.name)}</span>`).join('');
  const rows = [...ed].sort((a,b)=>b.reps-a.reps).map(({c,reps,cards})=>{
    const cov2=coverage(c.id,null), d=due(c.id,'both').length;
    const coreN=bCards(c.id,'core').length, extraN=bCards(c.id,'extra').length;
    const corePct=cards?Math.round(coreN/cards*100):0;
    const rh=cCards(c.id).filter(x=>x.reps>0).flatMap(x=>x.hist.slice(-5));
    const ws=rh.length?Math.round(rh.filter(r=>r>=2).length/rh.length*100):null;
    const wsColor=ws===null?'var(--text3)':ws>=70?'var(--core-text)':ws>=40?'var(--hard-text)':'var(--fail-text)';
    const ep=Math.round(reps/maxR*100);
    const rpc=cards?Math.round(reps/cards*10)/10:0;
    const maxRpc=Math.max(...ed.map(e=>e.cards?e.reps/e.cards:0),.01);
    const rpcPct=Math.round(rpc/maxRpc*100);
    return `<div class="course-ov-card" onclick="setCourse('${c.id}');setView('stats')">
      <div class="cov-top">
        <span style="width:10px;height:10px;border-radius:50%;background:${color(c)};display:inline-block;flex-shrink:0"></span>
        <span style="font-size:14px;font-weight:700;flex:1">${esc(c.name)}</span>
        <span style="font-size:11px;color:var(--text3)">${cards} cards</span>
      </div>
      <div class="cov-kpis">
        <div class="cov-kpi"><div class="v" style="color:${d>0?'var(--hard-text)':'var(--core-text)'}">${d}</div><div class="l">Due</div></div>
        <div class="cov-kpi"><div class="v" style="color:${cov2>=70?'var(--core-text)':cov2>=40?'var(--hard-text)':'var(--fail-text)'}">${cov2}%</div><div class="l">Cover</div></div>
        <div class="cov-kpi"><div class="v" style="color:${wsColor}">${ws!==null?ws+'%':'—'}</div><div class="l">Success</div></div>
        <div class="cov-kpi"><div class="v" style="color:var(--core-text)">${coreN}</div><div class="l">Core</div></div>
        <div class="cov-kpi"><div class="v" style="color:var(--extra-text)">${extraN}</div><div class="l">Extra</div></div>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:3px">Effort (${reps} reps)</div>
      <div class="bar-mini"><div class="bar-mini-fill" style="width:${ep}%;background:${color(c)}"></div></div>
      <div style="font-size:10px;color:var(--text3);margin-top:6px;margin-bottom:3px">Intensity (${rpc} reps/card)</div>
      <div class="bar-mini"><div class="bar-mini-fill" style="width:${rpcPct}%;background:${color(c)}99"></div></div>
      <div style="font-size:10px;color:var(--text3);margin-top:6px;margin-bottom:3px">Core / Extra split</div>
      <div class="split-bar" style="height:5px"><div class="sb-core" style="width:${corePct}%"></div><div class="sb-extra" style="width:${100-corePct}%"></div></div>
    </div>`;
  }).join('');

  return `
    <div class="stat-card-row">
      <div class="stat-card-item"><div class="sci-val">${cs.length}</div><div class="sci-lbl">Courses</div></div>
      <div class="stat-card-item"><div class="sci-val">${totalCards}</div><div class="sci-lbl">Cards</div></div>
      <div class="stat-card-item"><div class="sci-val" style="color:${totalDue>0?'var(--hard-text)':'var(--core-text)'}">${totalDue}</div><div class="sci-lbl">Due now</div></div>
    </div>
    <div class="stats-section-title">Effort breakdown</div>
    ${et>0?`<div class="ov-effort-bar">${segs}</div><div class="ov-legend">${legend}</div>`:`<div class="empty-state" style="padding:16px 0">No reviews yet.</div>`}
    <div class="stats-section-title">By course</div>
    ${rows}`;
}

function renderImport() {
  const p = S.importParsed, status = S.importStatus;
  const preview = p.length ? p.slice(0,5).map(c=>`<div class="preview-item">
    <span class="pill ${c.br}" style="flex-shrink:0">${c.br.toUpperCase()}</span>
    <div><div class="pi-front">${esc(c.front)}</div><div class="pi-back">${esc(c.back)}</div></div>
  </div>`).join('') + (p.length>5?`<div style="text-align:center;font-size:12px;color:var(--text3);padding:8px">…and ${p.length-5} more</div>`:'') : '';
  const statusHtml = status==='ok'&&p.length
    ? `<div class="status-ok">✓ ${p.length} card${p.length>1?'s':''} detected — ready to import</div>`
    : status==='error' ? `<div class="status-err">⚠ ${esc(S.importError||'Parse error')}</div>` : '';
  const courseOpts = S.courses.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');

  return `
    <div class="prompt-box">
      <div class="prompt-label">✨ Master Prompt</div>
      <div class="prompt-preview">${esc(MASTER_PROMPT.slice(0,300))}...</div>
      <button class="copy-btn" id="copy-prompt-btn" onclick="copyPrompt()">📋 Copy prompt</button>
    </div>
    <div class="how-to">
      <strong>How to use:</strong><br>
      1. Copy the prompt above → 2. Open a new chat → 3. Paste the prompt → 4. Send your course notes → 5. Copy the AI's response → 6. Paste below → 7. Import!
    </div>
    <div class="field"><label>Paste AI response here</label></div>
    <div class="import-drop">
      <textarea class="import-drop" placeholder="##FLASHCARDS_START##&#10;CARD_START&#10;FRONT: ...&#10;BACK: ...&#10;BRANCH: CORE&#10;CARD_END&#10;##FLASHCARDS_END##" oninput="onImportInput(this.value)">${esc(S.importRaw)}</textarea>
    </div>
    ${statusHtml}
    ${preview}
    ${p.length ? `<div class="import-actions">
      <div class="field"><label>Target course</label><select id="import-target">${courseOpts}</select></div>
      <button class="btn primary" onclick="confirmImport()">⬇ Import ${p.length} card${p.length>1?'s':''}</button>
      <button class="btn" onclick="clearImport()">✕ Clear</button>
    </div>` : ''}
    ${S.importSuccess ? `<div class="status-ok" style="margin-top:12px;text-align:center;font-size:14px;font-weight:600">✓ Cards imported! Go practice.</div>` : ''}`;
}

function renderArchive() {
  const archived = S.archived.filter(a=>a.status==='archived');
  const trashed = S.archived.filter(a=>a.status==='trashed');
  const row = (a,isTrashed) => `<div class="arch-item${isTrashed?' dim':''}">
    <div class="arch-icon" style="background:${isTrashed?'var(--fail-bg)':'var(--med-bg)'}">${isTrashed?'🗑':'📦'}</div>
    <div>
      <div class="arch-name">${esc(a.course.name)}</div>
      <div class="arch-meta">${a.cards.length} cards · ${fmtDate(a.archivedAt)}</div>
    </div>
    <div class="arch-actions">
      <button class="arch-btn restore" onclick="restoreCourse('${a.id}')">Restore</button>
      ${isTrashed?`<button class="arch-btn del" onclick="askPermDelete('${a.id}')">Delete</button>`:''}
    </div>
  </div>`;

  return `
    <button class="back-btn" onclick="goMain()">← Back</button>
    <div class="stats-section-title">Archived courses</div>
    ${archived.length ? archived.map(a=>row(a,false)).join('') : `<div class="empty-state" style="padding:16px 0">No archived courses.</div>`}
    <div class="stats-section-title" style="margin-top:16px">Trash</div>
    ${trashed.length ? trashed.map(a=>row(a,true)).join('') : `<div class="empty-state" style="padding:16px 0">Trash is empty.</div>`}`;
}

// ── ACTIONS ──
function setCourse(id) {
  S.activeCourse=id;
  S.session={queue:[],current:0,flipped:false,stats:{good:0,med:0,hard:0,fail:0},cid:null,mode:null};
  if(S.activeView==='overview') S.activeView='create';
  render();
}
function setView(v) { S.activeView=v; render(); }
function setMode(m) { S.practiceMode=m; S.session={queue:[],current:0,flipped:false,stats:{good:0,med:0,hard:0,fail:0},cid:null,mode:null}; render(); }
function goArchive() { S.page='archive'; S.modal=null; render(); }
function goMain() { S.page='main'; S.modal=null; render(); }
function closeModal() { S.modal=null; render(); }
function showAddCourse() { S.modal={type:'add-course'}; render(); }
function askRemove(id) { S.modal={type:'remove-course',id}; render(); }
function askPermDelete(id) { S.modal={type:'perm-delete',id}; render(); }

function addCourse() {
  const el=document.getElementById('nc-name'); if(!el) return;
  const name=el.value.trim(); if(!name) return;
  const id='c'+Date.now();
  S.courses.push({id,name,ci:S.courses.length%PALETTE.length});
  S.activeCourse=id; S.modal=null; save(); render();
}
function archiveCourse(id) {
  const course=S.courses.find(c=>c.id===id);
  const cards=cCards(id).map(c=>({...c}));
  S.archived.push({id:'arc_'+Date.now(),course:{...course},cards,status:'archived',archivedAt:Date.now()});
  S.cards=S.cards.filter(c=>c.cid!==id);
  S.courses=S.courses.filter(c=>c.id!==id);
  if(S.activeCourse===id) S.activeCourse=S.courses.length?S.courses[0].id:null;
  S.modal=null; S.session={queue:[],current:0,flipped:false,stats:{good:0,med:0,hard:0,fail:0},cid:null,mode:null};
  save(); render();
}
function trashCourse(id) {
  const course=S.courses.find(c=>c.id===id);
  const cards=cCards(id).map(c=>({...c}));
  S.archived.push({id:'tsh_'+Date.now(),course:{...course},cards,status:'trashed',archivedAt:Date.now()});
  S.cards=S.cards.filter(c=>c.cid!==id);
  S.courses=S.courses.filter(c=>c.id!==id);
  if(S.activeCourse===id) S.activeCourse=S.courses.length?S.courses[0].id:null;
  S.modal=null; S.session={queue:[],current:0,flipped:false,stats:{good:0,med:0,hard:0,fail:0},cid:null,mode:null};
  save(); render();
}
function restoreCourse(aid) {
  const e=S.archived.find(a=>a.id===aid); if(!e) return;
  const newCid='c'+Date.now();
  S.courses.push({...e.course,id:newCid,ci:S.courses.length%PALETTE.length});
  e.cards.forEach(c=>S.cards.push({...c,id:nid(),cid:newCid,br:c.br||'core'}));
  S.archived=S.archived.filter(a=>a.id!==aid);
  S.activeCourse=newCid; S.page='main'; S.modal=null; save(); render();
}
function permDelete(aid) {
  S.archived=S.archived.filter(a=>a.id!==aid); S.modal=null; save(); render();
}
function addCard() {
  const f=document.getElementById('inp-front'), b=document.getElementById('inp-back');
  if(!f||!b) return;
  const front=f.value.trim(), back=b.value.trim();
  if(!front||!back) return;
  S.cards.push({id:nid(),cid:S.activeCourse,front,back,br:'core',iv:1,ef:2.5,due:Date.now(),reps:0,hist:[]});
  save(); f.value=''; b.value=''; render();
}
function delCard(id) { S.cards=S.cards.filter(c=>c.id!==id); save(); render(); }
function toggleBranch(id) {
  const c=S.cards.find(c=>c.id===id); if(!c) return;
  c.br=c.br==='core'?'extra':'core'; save(); render();
}
function setCardBranch(id,br) {
  const c=S.cards.find(c=>c.id===id); if(!c||c.br===br) return;
  c.br=br;
  const sq=S.session.queue.find(c=>c.id===id); if(sq) sq.br=br;
  save(); render();
}
function startSession(cid,mode) {
  const q=due(cid,mode);
  S.session={queue:[...q].sort(()=>Math.random()-.5),current:0,flipped:false,stats:{good:0,med:0,hard:0,fail:0},cid,mode};
  render();
}
function flipCard() { S.session.flipped=!S.session.flipped; render(); }
function rate(r) {
  const card=S.session.queue[S.session.current];
  applyRating(card,r);
  const k=['fail','hard','med','good'][r];
  S.session.stats[k]++;
  S.session.current++; S.session.flipped=false; render();
}
function onImportInput(val) {
  S.importRaw=val; S.importSuccess=false;
  if(!val.trim()){S.importParsed=[];S.importStatus=null;S.importError=null;render();return;}
  const res=parseImport(val);
  if(res.error){S.importParsed=[];S.importStatus='error';S.importError=res.error;}
  else{S.importParsed=res.cards;S.importStatus='ok';S.importError=null;}
  render();
}
function confirmImport() {
  const sel=document.getElementById('import-target');
  const targetCid=sel?sel.value:(S.activeCourse||S.courses[0]?.id);
  if(!targetCid) return;
  const now=Date.now();
  S.importParsed.forEach(c=>{
    S.cards.push({id:nid(),cid:targetCid,front:c.front,back:c.back,br:c.br,iv:1,ef:2.5,due:now,reps:0,hist:[]});
  });
  save(); S.importRaw='';S.importParsed=[];S.importStatus=null;S.importError=null;S.importSuccess=true;
  render();
}
function clearImport() { S.importRaw='';S.importParsed=[];S.importStatus=null;S.importError=null;S.importSuccess=false;render(); }
function copyPrompt() {
  navigator.clipboard.writeText(MASTER_PROMPT).then(()=>{
    const btn=document.getElementById('copy-prompt-btn');
    if(btn){btn.className='copy-btn copied';btn.textContent='✓ Copied!';setTimeout(()=>{btn.className='copy-btn';btn.textContent='📋 Copy prompt';},2000);}
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=MASTER_PROMPT; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    const btn=document.getElementById('copy-prompt-btn');
    if(btn){btn.className='copy-btn copied';btn.textContent='✓ Copied!';setTimeout(()=>{btn.className='copy-btn';btn.textContent='📋 Copy prompt';},2000);}
  });
}

// Show a loading splash while IDB initialises (usually <100ms)
document.getElementById('content').innerHTML = `
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px">
    <div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite"></div>
    <div style="font-size:14px;color:var(--text3)">Loading your cards...</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

(async () => {
  await load();
  render();
  const mode = _idb ? 'IndexedDB' : 'localStorage';
  const badge = document.createElement('div');
  badge.style.cssText = 'position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 68px);right:12px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--text3);z-index:500;pointer-events:none;transition:opacity .5s';
  badge.textContent = 'Saved: ' + mode;
  document.body.appendChild(badge);
  setTimeout(() => { badge.style.opacity='0'; setTimeout(()=>badge.remove(), 600); }, 3000);
})();
</script>
</body>
